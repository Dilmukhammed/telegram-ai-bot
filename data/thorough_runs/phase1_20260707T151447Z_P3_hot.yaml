phase_plan:
  planner_id: hot_window
  summary: >
    Поиск 5 кофеен/коворкингов в Ташкенте, подходящих для работы с ноутбуком,
    с последующим сохранением данных в Google-таблицу и формированием итоговой
    рекомендации. Данные фиксируются в таблице до схлопывания контекста поиска.
  phase_count: 2
  phases:
    - id: 1
      name: Сбор данных о кофейнях Ташкента
      goal: Найти 5 кофеен/коворкингов в Ташкенте с ноутбуко-дружественной атмосферой и собрать по ним структурированные данные (название, адрес, часы, Wi-Fi, розетки, цена эспрессо, источник).
      logical_blocks:
        - Поиск кофеен и коворкингов Ташкента, подходящих для работы с ноутбуком.
        - Извлечение по каждому месту: название, район/адрес, часы работы, наличие Wi-Fi, наличие розеток, примерная цена эспрессо, URL источника.
        - Формирование структурированного списка из 5 заведений с полными атрибутами.
      entry_condition: Пустой контекст, нет внешних данных.
      exit_condition: Имеется список из 5 заведений с заполненными атрибутами, готовый к переносу в таблицу.
      collapse_risk: high
      must_persist_before_exit:
        - "Названия, адреса, часы, Wi-Fi, розетки, цена эспрессо и ссылки по всем 5 заведениям сохранены в Google-таблицу."
      context_notes: >
        Результаты поиска и веб-страниц схлопываются быстро. Критически важно
        перенести все 5 строк в Google Sheets до окончания горячей зоны (~8-10 ходов).
        Не держать сырые данные в контексте без записи.
    - id: 2
      name: Запись в Google Sheets и итоговая рекомендация
      goal: Создать таблицу «Ташкент — кофейни для работы», заполнить 5 строк данных и сформулировать рекомендацию по лучшему месту для длинной работы.
      logical_blocks:
        - Создание Google-таблицы «Ташкент — кофейни для работы» с заголовками: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Ссылка на источник.
        - Заполнение 5 строк данными из фазы 1.
        - Формирование короткого сообщения (2–3 предложения) о том, какая из пяти кофеен лучше для длинной работы и почему, с опорой на наличие розеток, Wi-Fi и часов работы.
      entry_condition: Данные по 5 кофейням собраны и доступны.
      exit_condition: Google-таблица создана и заполнена; пользователю отправлена итоговая рекомендация.
      collapse_risk: low
      must_persist_before_exit:
        - "Google-таблица создана и содержит все 5 строк с данными."
        - "Итоговая рекомендация (2–3 предложения) отправлена пользователю."
      context_notes: >
        Все тяжёлые данные уже в Sheets, риск схлопывания минимален.
        Рекомендация формируется на основе уже сохранённых атрибутов.
  delivery_atmosphere: >
    Деловой, лаконичный. Итог — ссылка на таблицу и короткий текстовый вывод.
  non_goals:
    - Не составлять полный каталог всех кофеен Ташкента.
    - Не проверять актуальность цен и часов в реальном времени с обзвоном заведений.
  assumptions:
    - Под «кофейней для работы» понимается место с Wi-Fi, розетками и относительно спокойной атмосферой.
    - Цена эспрессо указывается приблизительно, на основе открытых источников.
    - Если точных данных по Wi-Fi или розеткам нет, ставится «неизвестно».