```yaml
phase_plan:
  planner_id: surface
  summary: >
    Подбор 5 отелей/апартаментов с критериями (цена, рейтинг/отзывы,
    пешком до метро, Wi-Fi, парковка, завтрак, тип номера),
    упаковка в Google-таблицу с сортировкой, карта с 2–3 альтернативами,
    доставка пользователю.

  phase_count: 4

  assumptions:
    - "Город и точка назначения распознаются из уточнения пользователя (в исходном сообщении кодировка повреждена)."
    - "Источники: агрегаторы отелей (Островок, Яндекс.Путешествия, Booking, Bronevik) + Google Maps для транспорта."
    - "Цена — за ночь в рублях на ближайшие доступные даты (или типовая, если даты не заданы)."
    - "Карта — Google My Maps или статичные ссылки Google Maps с пинами."

  non_goals:
    - "Бронирование от имени пользователя."
    - "Глубокий анализ отзывов (тональность, тематика) — только агрегированная оценка и количество."
    - "Проверка доступности на конкретные даты, если они не указаны."

  phases:
    - id: 1
      name: "Исследование и сбор кандидатов"
      goal: >
        Найти 7–10 кандидатов (отели/апартаменты) в целевом городе
        с базовыми данными: название, тип, цена, рейтинг, количество отзывов,
        ссылка на источник, координаты или адрес.
      logical_blocks:
        - "Веб-поиск по агрегаторам: запрос вида «отели/apартаменты [город] [район/метро] цена рейтинг»."
        - "Дополнительный поиск апартаментов отдельно (Суточно.ру, Avito, Tvil)."
        - "Извлечь из каждой карточки: название, цена/ночь, рейтинг, число отзывов, адрес/координаты, ссылка."
        - "Сохранить промежуточные данные в черновик листа или текстовый буфер: по одному блоку на отель."
      entry_condition: "Город и точка назначения известны (уточнены или извлечены из контекста)."
      exit_condition: "7–10 кандидатов с базовыми полями записаны в черновик."
      collapse_risk: medium
      must_persist_before_exit:
        - "Список кандидатов: название, адрес, цена, рейтинг, отзывов, ссылка — в черновик Google Sheet или workspace-файл."
        - "Координаты/адреса каждого кандидата — для фазы 2 (Google Maps)."
      context_notes: >
        После ~8–10 ходов поиска карточки отелей начнут коллапсировать в заглушки.
        Критично: сразу после чтения карточки записывать её поля в черновик,
        не рассчитывая на повторное обращение к исходному JSON.

    - id: 2
      name: "Верификация и обогащение данных"
      goal: >
        Для каждого кандидата уточнить: пешее расстояние до ближайшего метро
        (в минутах), Wi-Fi (бесплатно/платно/нет данных), парковка
