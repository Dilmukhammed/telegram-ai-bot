phase_plan:
  planner_id: surface
  summary: >
    Создать Google-таблицу «Ташкент — кофейни для работы» с 5 проверенными местами
    (название, район/адрес, часы, Wi-Fi, розетки, цена эспрессо, ссылка) на одном табе,
    затем отправить пользователю короткую рекомендацию лучшего места для долгой работы.
  phase_count: 3
  delivery_atmosphere:
    tone: практичный, дружелюбный, без воды
    user_facing: финальное сообщение — 2–3 предложения с рекомендацией и ссылкой на таблицу

  phases:
    - id: 1
      name: "Исследование: 5 кофеен/коворкингов Ташкента"
      goal: >
        Найти 5 мест в Ташкенте, куда реально прийти с ноутбуком,
        и собрать для каждого: название, район/адрес, часы работы,
        Wi-Fi (да/нет/неизвестно), розетки (да/нет/неизвестно),
        примерная цена эспрессо (или «—»), ссылка-источник.
      logical_blocks:
        - "Веб-поиск: «кофейни для работы Ташкент», «коворкинг Ташкент с Wi-Fi», отзывы/статьи"
        - "Для каждого места проверить: часы, Wi-Fi, розетки, цену — из статьи/карточки/отзыва"
        - "Если данные конфликтуют — взять наиболее свежий/надёжный источник, источник зафиксировать"
        - "Сформировать компактный список из 5 записей с 7 полями каждая"
      entry_condition: "Пользователь запросил таблицу; контекст пуст."
      exit_condition: "Собрано 5 записей, каждая имеет хотя бы название и ссылку; остальные поля заполнены или помечены «—»/«неизвестно»."
      collapse_risk: medium
      must_persist_before_exit:
        - "5 записей с 7 полями каждая перенесены в рабочую заметку (текстовый блок в сообщении), чтобы не зависеть от горячих результатов поиска"
        - "Ссылки-источники сохранены в том же блоке, по одной на запись"
      context_notes: >
        Результаты веб-поиска ~150+ символов уходят в архив; нужно сразу
        извлекать факты и записывать в текстовый блок. Не полагаться на
        повторное чтение сырых результатов на следующем шаге.

    - id: 2
      name: "Создание Google-таблицы и заполнение данных"
      goal: >
        Создать Google-таблицу «Ташкент — кофейни для работы»,
        один таб, заголовки в строке 1, 5 строк данных.
      logical_blocks:
        - "Создать новую Google-таблицу с названием «Ташкент — кофейни для работы»"
        - "Заполнить строку 1 заголовками: Название | Район/Адрес | Часы работы | Wi-Fi | Розетки | Цена эспрессо | Источник"
        - "Заполнить строки 2–6 данными из блока, зафиксированного в фазе 1"
        - "Проверить, что все 5 строк на месте и заголовки в первой строке"
      entry_condition: "5 записей с полями и ссылками зафиксированы в рабочей заметке."
      exit_condition: "Таблица создана, 5 строк + заголовки записаны, URL таблицы получен."
      collapse_risk: low
      must_persist_before_exit:
        - "URL созданной таблицы сохранён в сообщении"
        - "Подтверждение: 6 строк (1 заголовок + 5 данных) записаны в таб"
      context_notes: >
        Все данные уже в текстовом блоке из фазы 1 — таблица заполняется
        из него, повторный веб-поиск не нужен.

    - id: 3
      name: "Финальное сообщение пользователю"
      goal: >
        Отправить короткое сообщение: ссылка на таблицу + рекомендация
        лучшего из 5 мест для долгой работы (2–3 предложения, с причиной).
      logical_blocks:
        - "Указать ссылку на Google-таблицу"
        - "Назвать лучшее место для длинной работы и кратко объяснить почему (Wi-Fi, розетки, часы, атмосфера)"
        - "2–3 предложения, без лишнего текста"
      entry_condition: "Таблица создана, URL доступен."
      exit_condition: "Пользователь получил ссылку и рекомендацию."
      collapse_risk: low
      must_persist_before_exit:
        - "Ссылка на таблицу в финальном сообщении"
        - "Название рекомендованного места и причина"
      context_notes: >
        Выбор «лучшего» делается на основе данных из таблицы:
        предпочтение — круглосуточные/долгие часы, подтверждённый Wi-Fi,
        розетки, приемлемая цена. Если однозначного лидера нет —
        выбрать по совокупности и честно оговорить компромисс.

  non_goals:
    - "Карта с точками — не требуется"
    - "Более 5 мест — не нужно"
    - "Фото или описания интерьеров — не нужны"
    - "Ранжирование всех 5 по местам — только одна рекомендация в тексте"

  assumptions:
    - "У пользователя есть доступ к Google-таблицам по ссылке"
    - "Если часы/Wi-Fi/розетки не подтверждены источником — ставим «неизвестно»"
    - "Цена эспрессо — в сумах или «—», если нет в источнике"