phase_plan:
  planner_id: hot_window
  summary: Поиск 5 кофеен в Ташкенте для работы с ноутбуком, создание Google-таблицы с сохранением всех данных для предотвращения коллапса контекста, и выдача финальной рекомендации.
  phase_count: 2
  phases:
    - id: 1
      name: Сбор данных и немедленная персистенция
      goal: Найти 5 кофеен/коворкингов в Ташкенте, подходящих для работы с ноутбуком, и немедленно сохранить все извлеченные поля в новую Google-таблицу, чтобы избежать потери данных из-за коллапса контекста.
      logical_blocks:
        - Поиск информации о кофейнях и коворкингах в Ташкенте, где можно работать с ноутбуком.
        - Извлечение для 5 мест: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Ссылка на источник.
        - Создание Google-таблицы «Ташкент — кофейни для работы».
        - Запись заголовков в первую строку.
        - Запись 5 строк с извлеченными данными о кофейнях.
      entry_condition: Получен запрос от пользователя.
      exit_condition: Google-таблица создана, заголовки добавлены, все 5 строк с данными успешно записаны.
      collapse_risk: high
      must_persist_before_exit:
        - Создание Google-таблицы «Ташкент — кофейни для работы».
        - Запись заголовков в строку 1.
        - Запись всех 5 строк с данными о кофейнях в таблицу.
      context_notes: Результаты поиска будут быстро коллапсировать. Нельзя удерживать все 5 детальных результатов поиска в памяти. Необходимо сразу после извлечения данных записывать их в таблицу. Сырые данные поиска должны быть выгружены в таблицу до перехода к Фазе 2.
    - id: 2
      name: Финальная рекомендация и доставка
      goal: Проанализировать сохраненные данные, выбрать лучшую кофейню для длительной работы и отправить пользователю финальное сообщение с рекомендацией и ссылкой на таблицу.
      logical_blocks:
        - Анализ сохраненных в таблице данных (наличие Wi-Fi, розеток, часы работы).
        - Выбор лучшего места для длительной работы.
        - Формирование короткого сообщения (2-3 предложения) на русском языке с обоснованием выбора.
        - Отправка пользователю финального сообщения и ссылки на созданную Google-таблицу.
      entry_condition: Фаза 1 завершена, данные надежно сохранены в Google-таблице.
      exit_condition: Финальное сообщение с рекомендацией и ссылкой на таблицу доставлено пользователю.
      collapse_risk: low
      must_persist_before_exit:
        - Финальное сообщение с рекомендацией отправлено пользователю.
        - Ссылка на Google-таблицу предоставлена пользователю.
      context_notes: Поскольку сырые данные поиска уже коллапсировали, основание для рекомендации должно опираться строго на структурированные данные, которые теперь живут в Google-таблице (например, наличие подтвержденных Wi-Fi и розеток).