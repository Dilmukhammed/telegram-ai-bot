phase_plan:
  planner_id: surface
  summary: >
    Найти 5 реальных кофеен/коворкингов в Ташкенте, пригодных для работы с ноутбуком,
    записать данные в Google-таблицу с заданными колонками и одним табом,
    затем отправить пользователю короткое сообщение с рекомендацией лучшей для долгой работы.
  phase_count: 3
  delivery_atmosphere:
    tone: дружелюбный, практичный, без воды
    user_facing: финальное сообщение — 2–3 предложения с конкретной рекомендацией и причиной
  assumptions:
    - У пользователя есть подключённый Google-аккаунт для создания таблицы
    - Веб-поиск выдаёт достаточно источников (карты, обзоры, сайты кофеен) для 5 точек
    - Не все данные (Wi-Fi, розетки, цена) будут подтверждены — допустимо «неизвестно» или «—»
  non_goals:
    - Не делаем несколько вкладок — только один таб
    - Не добавляем форматирование/цвета — только заголовки и данные
    - Не ищем больше 5 точек

  phases:
    - id: 1
      name: "Сбор данных по кофейням Ташкента"
      goal: >
        Найти через веб-поиск 5 кофеен или коворкингов в Ташкене,
        куда реально приходят с ноутбуком. Для каждой собрать:
        название, район/адрес, часы работы, наличие Wi-Fi, наличие розеток,
        примерную цену эспрессо, ссылку на источник.
      logical_blocks:
        - block: "Поиск запросами вида «кофейни для работы Ташкент ноутбук», «коворкинг Ташкент с Wi-Fi», «best cafes to work Tashkent laptop»"
        - block: "Для каждого кандидата углублённый фетч страницы/обзора для подтверждения: адрес, часы, Wi-Fi, розетки, цена"
        - block: "Сбор всех 5 строк в единую структуру в памяти агента (название, адрес, часы, wifi, розетки, цена эспрессо, ссылка)"
        - block: "Помещение собранных фактов в durable-хранилище (draft-документ или рабочий лист) до создания финальной таблицы"
      entry_condition: "Пользователь дал запрос на создание таблицы и поиск кофеен"
      exit_condition: "Собрано ровно 5 строк с минимум: название, адрес, ссылка на источник; остальные поля могут быть «неизвестно»/«—»"
      collapse_risk: high
      must_persist_before_exit:
        - "Все 5 строк с 7 полями каждая сохранены в черновой документ или временный лист — НЕ только в контексте"
        - "Ссылки-источники сохранены отдельно для каждой строки"
      context_notes: >
        Веб-результаты объёмные и быстро коллапсируют. После каждого успешного фетча
        немедленно извлекать и persist ключевые поля. Не рассчитывать, что сырые
        результаты поиска будут доступны через 8+ ходов.

    - id: 2
      name: "Создание Google-таблицы и заполнение данных"
      goal: >
        Создать Google-таблицу с названием «Ташкент — кофейни для работы»,
        один таб, заголовки в первой строке, 5 строк данных.
      logical_blocks:
        - block: "Создать новую Google-таблицу с заданным именем"
        - block: "Записать в первую строку заголовки: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Ссылка"
        - block: "Заполнить строки 2–6 данными из persisted-черновика фазы 1"
        - block: "Проверить, что все 5 строк на месте и ссылки корректны"
      entry_condition: "Фаза 1 завершена — 5 строк persisted в durable-хранилище"
      exit_condition: "Таблица создана, содержит 1 таб, 7 колонок, 6 строк (1 заголовок + 5 данных), доступна пользователю"
      collapse_risk: low
      must_persist_before_exit:
        - "URL готовой Google-таблицы зафиксирован для доставки пользователю"
        - "Содержимое таблицы (5 строк) сохранено в fact store или рабочий лист как backup"
      context_notes: >
        Брать данные из persisted-черновика, а не из контекста — к этому моменту
        исходные веб-результаты уже коллапсировали.

    - id: 3
      name: "Финальное сообщение пользователю"
      goal: >
        Отправить короткое сообщение: ссылка на таблицу + рекомендация
        лучшей из 5 кофеен для долгой работы (2–3 предложения с причиной).
      logical_blocks:
        - block: "Определить лучшую точку по критериям: подтверждённый Wi-Fi, розетки, длинные часы работы, ценовая доступность"
        - block: "Сформулировать 2–3 предложения: название, причина (Wi-Fi/розетки/часы), ссылка на таблицу"
      entry_condition: "Таблица создана и доступна (фаза 2 завершена)"
      exit_condition: "Пользователь получил ссылку на таблицу и рекомендацию"
      collapse_risk: low
      must_persist_before_exit:
        - "Финальное сообщение доставлено пользователю (telegram или канал ответа)"
      context_notes: >
        Рекомендация основывается на persisted-данных из фазы 1, не на сыром контексте.
        Если две точки равноценны — выбрать ту, у которой больше подтверждённых полей.