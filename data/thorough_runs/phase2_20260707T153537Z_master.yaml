master_phase_plan:
  version: 1
  source_plans:
    - P1_unit
    - P2_surface
    - P3_hot
  merge_summary: "Skeleton from P1: 7 phases (setup + 5 individual cafes + verdict). P3 hot-window risk overlaid on cafe phases — collapse_risk raised to high, context_notes warn of rapid search-result archiving. No batch grouping applied: P3 does not specify batch=2 and P1 unit-boundary rule forbids merging 5 cafes into 1 batch. P2 delivery_atmosphere, non_goals, assumptions copied to globals. P2 final delivery overlaid onto P1 p7 (mp7)."
  phase_count: 7
  delivery_atmosphere:
    tone: "дружелюбный, по делу, без воды"
    user_facing: "Сообщение на русском: ссылка на таблицу + короткая рекомендация. Без технических деталей."
  non_goals:
    - "Не нужно собирать больше 5 точек"
    - "Не нужно украшать таблицу (цвета, форматирование) — только данные"
    - "Не нужно искать отзывы или рейтинги — только факты: часы, Wi-Fi, розетки, цена"
  assumptions:
    - "Wi-Fi и розетки могут быть не указаны в источниках — в этом случае ставим 'неизвестно'"
    - "Цена эспрессо может быть не указана — ставим '—'"
    - "Часы работы могут быть сезонными или устаревшими — указываем как есть из источника"
  phases:
    - id: mp1
      name: "Создание таблицы и заголовков"
      goal: "Создать новый Google Sheet с названием «Ташкент — кофейни для работы», оставить один таб, установить заголовки в первой строке."
      logical_blocks:
        - "Создать таблицу"
        - "Оставить один таб (удалить лишние, если есть)"
        - "Записать заголовки в строку 1: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Источник"
        - "Зафиксировать ID и URL таблицы"
      entry_condition: "Нет существующей таблицы для этой задачи"
      exit_condition: "Таблица создана, заголовки в строке 1, ID и URL таблицы известны"
      must_persist_before_exit:
        - "ID таблицы"
        - "URL таблицы"
        - "Подтверждение: заголовки записаны в строку 1"
      collapse_risk: low
      context_notes: "ID таблицы потребуется во всех последующих фазах записи. P3 предупреждает: не удерживать сырые данные поиска в памяти — сразу выгружать в таблицу."
      delivery:
        surface: none
        visible_to_user: false
        format_notes: ""
      contributed_by:
        - P1:p1
        - P3:1

    - id: mp2
      name: "Кофейня 1"
      goal: "Найти первую кофейню/коворкинг в Ташкенте для работы с ноутбуком, извлечь требуемые поля и записать в строку 2."
      logical_blocks:
        - "Веб-поиск заведения в Ташкенте с возможностью работы с ноутбуком"
        - "Извлечь: название, район/адрес, часы работы, Wi-Fi (да/нет/неизвестно), розетки (да/нет/неизвестно), цена эспрессо (или '—'), ссылка на источник"
        - "Зафиксировать извлечённые данные в тексте рабочего сообщения (не только в результатах поиска)"
        - "Записать данные в строку 2 таблицы"
      entry_condition: "Таблица с заголовками существует, ID таблицы известен"
      exit_condition: "Строка 2 таблицы содержит данные первой кофейни"
      must_persist_before_exit:
        - "Данные строки 2 записаны в таблицу"
        - "Структурированные данные кофейни 1 в тексте рабочего сообщения"
      collapse_risk: high
      context_notes: "Результаты веб-поиска коллапсируются быстро (~8-10 ходов). Немедленно после извлечения записать в таблицу. Не рассчитывать на повторное чтение сырых данных. Если Wi-Fi/розетки не указаны явно — ставить 'неизвестно', не догадываться."
      delivery:
        surface: none
        visible_to_user: false
        format_notes: ""
      contributed_by:
        - P1:p2
        - P2:p1
        - P3:1

    - id: mp3
      name: "Кофейня 2"
