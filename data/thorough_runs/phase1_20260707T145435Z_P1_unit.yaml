phase_plan:
  planner_id: unit
  summary: "Сбор и сравнение 5 коворкингов Москвы по 7 критериям с сохранением в Google Таблицы и итоговыми рекомендациями."
  phase_count: 7
  phases:
    - id: 1
      name: "Подготовка структуры данных"
      goal: "Определить критерии оценки и создать Google Таблицы для хранения результатов."
      logical_blocks:
        - "Уточнить шкалу оценки (например, 1–5) и финальную формулу общего рейтинга."
        - "Создать новую Google Таблицу с листами: «Данные», «Сравнение», «Рекомендации»."
        - "Прописать заголовки: Название, Цена, Вместимость, Атмосфера, Wi‑Fi, Удобства, Транспортная доступность, Мероприятия, Общий рейтинг, Источники."
      entry_condition: "Получен запрос пользователя."
      exit_condition: "Таблица создана, схема оценки зафиксирована, ссылка сохранена."
      collapse_risk: low
      must_persist_before_exit:
        - "Идентификатор и ссылка на Google Таблицу."
        - "Схема критериев и шкалы."
      context_notes: "Единственная подготовительная фаза; все остальные пишут в эту же таблицу."

    - id: 2
      name: "Коворкинг 1 – поиск, оценка, запись"
      goal: "Собрать данные по первому коворкингу и сразу сохранить строку в таблицу."
      logical_blocks:
        - "Веб-поиск первого коворкинга (популярного или заранее отобранного)."
        - "Извлечь и оценить каждый из 7 критериев по заданной шкале."
        - "Вычислить общий рейтинг."
        - "Вписать полную строку на лист «Данные»."
      entry_condition: "Фаза 1 завершена."
      exit_condition: "Одна заполненная строка в таблице."
      collapse_risk: medium
      must_persist_before_exit:
        - "Итоговые оценки, общий рейтинг и источники первого коворкинга в таблице."
      context_notes: "Сразу после поиска данные должны быть записаны; полагаться на контекст после этой фазы нельзя."

    - id: 3
      name: "Коворкинг 2 – поиск, оценка, запись"
      goal: "Аналогичная обработка второго коворкинга."
      logical_blocks:
        - "Веб-поиск второго коворкинга."
        - "Оценка по тем же критериям."
        - "Запись строки."
      entry_condition: "Фаза 2 завершена."
      exit_condition: "Добавлена вторая строка."
      collapse_risk: medium
      must_persist_before_exit:
        - "Оценки, рейтинг и источники второго коворкинга в таблице."
      context_notes: "Изолированный шаг; после записи контекст может схлопнуться."

    - id: 4
      name: "Коворкинг 3 – поиск, оценка, запись"
      goal: "Аналогичная обработка третьего коворкинга."
      logical_blocks:
        - "Веб-поиск, оценка, запись строки."
      entry_condition: "Фаза 3 завершена."
      exit_condition: "Третья строка в таблице."
      collapse_risk: medium
      must_persist_before_exit:
        - "Данные третьего коворкинга."
      context_notes: ""

    - id: 5
      name: "Коворкинг 4 – поиск, оценка, запись"
      goal: "Аналогичная обработка четвёртого коворкинга."
      logical_blocks:
        - "Веб-поиск, оценка, запись строки."
      entry_condition: "Фаза 4 завершена."
      exit_condition: "Четвёртая строка в таблице."
      collapse_risk: medium
      must_persist_before_exit:
        - "Данные четвёртого коворкинга."
      context_notes: ""

    - id: 6
      name: "Коворкинг 5 – поиск, оценка, запись"
      goal: "Аналогичная обработка пятого коворкинга."
      logical_blocks:
        - "Веб-поиск, оценка, запись строки."
      entry_condition: "Фаза 5 завершена."
      exit_condition: "Пятая строка в таблице; все данные собраны."
      collapse_risk: medium
      must_persist_before_exit:
        - "Данные пятого коворкинга."
      context_notes: "После этой фазы таблица полностью заполнена."

    - id: 7
      name: "Сравнение и рекомендации"
      goal: "Сравнить коворкинги, выдать рекомендации с обоснованием и оформить итоги."
      logical_blocks:
        - "Загрузить все строки из листа «Данные»."
        - "Построить сводное сравнение на листе «Сравнение» (ранжирование, графики при необходимости)."
        - "Сформулировать текстовые рекомендации с аргументацией выбора лучших вариантов."
        - "Записать рекомендации на лист «Рекомендации»."
        - "Предоставить пользователю итоговую сводку в чате."
      entry_condition: "Фаза 6 завершена, 5 заполненных строк."
      exit_condition: "Сравнительный лист создан, рекомендации даны, пользователь проинформирован."
      collapse_risk: high
      must_persist_before_exit:
        - "Листы «Сравнение» и «Рекомендации» с итоговыми данными."
        - "Финальное сообщение с выводами."
      context_notes: "После пяти фаз контекст будет сильно схлопнут; необходимо перечитывать данные из таблицы как единственный источник истины."
  delivery_atmosphere: "Деловой и структурированный: чёткие цифры, таблица, обоснованный выбор."
  non_goals:
    - "Фактическая интеграция с календарём."
    - "Бронирование или прямой контакт с коворкингами."
  assumptions:
    - "Рассматриваются 5 конкретных коворкингов (не сетей), выбранных по популярности/доступности информации."
    - "Оценки формируются на основе общедоступных отзывов и описаний, носят усреднённый характер."
    - "Данные по Wi‑Fi и удобствам могут быть экспертными на основе вторичных источников."