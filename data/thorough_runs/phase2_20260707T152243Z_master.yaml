master_phase_plan:
  version: "1.0"
  source_plans: [P1_unit, P2_surface, P3_hot]
  merge_summary: >
    Skeleton from P1 (7 unit phases: setup + 5 cafes + verdict).
    Window grouping from P3: batch=2 for adjacent cafe search phases (mp2: cafes 1-2, mp3: cafes 3-4, mp4: cafe 5).
    Persist after EACH cafe unit inside grouped phases per collapse brief.
    Surface overlay from P2: delivery atmosphere and final user-facing recommendation phase.
    collapse_risk from P3 (high for search phases, low for setup/delivery).
  delivery_atmosphere:
    tone: дружелюбный, практичный, без воды
    user_facing: финальное сообщение — 2–3 предложения с конкретной рекомендацией и причиной
  non_goals:
    - Не делаем несколько вкладок — только один таб
    - Не добавляем форматирование/цвета — только заголовки и данные
    - Не ищем больше 5 точек
  assumptions:
    - У пользователя есть подключённый Google-аккаунт для создания таблицы
    - Веб-поиск выдаёт достаточно источников (карты, обзоры, сайты кофеен) для 5 точек
    - Не все данные (Wi-Fi, розетки, цена) будут подтверждены — допустимо «неизвестно» или «—»
    - Цены на эспрессо могут незначительно отличаться от актуальных на момент посещения
    - Наличие розеток и стабильность Wi-Fi оцениваются на основе открытых отзывов и описаний заведений
  phase_count: 5
  phases:
    - id: mp1
      name: Создание таблицы и заголовков
      goal: Создать новую Google-таблицу «Ташкент — кофейни для работы» с одним листом