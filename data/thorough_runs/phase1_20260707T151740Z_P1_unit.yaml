phase_plan:
  planner_id: unit
  summary: Создать Google-таблицу с кофейнями Ташкента для работы, найти 5 подходящих мест, заполнить 7 полей по каждому, выдать итоговую рекомендацию.
  phase_count: 7
  phases:
    - id: p1
      name: Создание таблицы и заголовков
      goal: Создать новую Google-таблицу «Ташкент — кофейни для работы» с одним листом и зафиксировать заголовки колонок.
      logical_blocks:
        - Создать таблицу с указанным названием
        - Записать в первую строку заголовки
        - Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Ссылка на источник
      entry_condition: Таблица ещё не создана.
      exit_condition: Таблица существует, в row 1 прописаны все 7 заголовков.
      collapse_risk: low
      must_persist_before_exit:
        - ID таблицы
        - Заголовки в row 1
      context_notes: После создания ID таблицы должен быть доступен для последующих фаз записи.

    - id: p2
      name: Кофейня 1 — поиск и запись
      goal: Найти первую кофейню/коворкинг в Ташкенте для работы с ноутбуком и записать её данные в row 2.
      logical_blocks:
        - Поиск в интернете заведения в Ташкенте с ноутбучной атмосферой
        - Извлечение полей
        - Запись в таблицу в row 2
      entry_condition: Таблица создана и заголовки установлены.
      exit_condition: Row 2 заполнена 7 полями (пустые/неизвестно допускаются как «—» или «неизвестно»).
      collapse_risk: medium
      must_persist_before_exit:
        - Данные row 2 в таблице
      context_notes: Результаты поиска должны быть немедленно перенесены в таблицу, пока контекст не свернулся.

    - id: p3
      name: Кофейня 2 — поиск и запись
      goal: Найти вторую кофейню/коворкинг и записать её данные в row 3.
