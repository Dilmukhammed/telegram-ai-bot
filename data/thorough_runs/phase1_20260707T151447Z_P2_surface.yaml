phase_plan:
  planner_id: surface
  summary: >
    Создать Google-таблицу с 5 проверенными кофейнями/коворкингами Ташкента,
    куда можно прийти с ноутбуком, заполнить строки по заданной схеме
    и отправить пользователю короткую рекомендацию.
  phase_count: 5
  phases:
    - id: 1
      name: Сбор кандидатов
      goal: >
        Найти в интернете не менее 5 кофеен/коворкингов в Ташкенте,
        где упоминается работа с ноутбуком (Wi-Fi, розетки, отзывы).
      logical_blocks:
        - Поиск по запросам «Ташкент кофейни с Wi-Fi», «коворкинг Ташкент ноутбуки», «coffee shop Tashkent work laptop».
        - Извлечение названия, адреса/района, часов работы, признаков Wi-Fi и розеток, цены эспрессо, URL-источника.
        - Фиксация сырых данных в рабочей заметке.
      entry_condition: Пользователь подтвердил задачу.
      exit_condition: Собрано ≥5 кандидатов с хотя бы названием и источником.
      collapse_risk: high
      must_persist_before_exit:
        - Рабочая заметка со списком кандидатов и ссылками сохранена в workspace-файл.
      context_notes: >
        Сырые результаты поиска быстро коллапсируют; сразу записывать ключевые поля
        в локальный файл, не держать их только в контексте.

    - id: 2
      name: Верификация и нормализация данных
      goal: >
        Для каждого кандидата уточнить адрес, часы, Wi-Fi, розетки, цену эспрессо.
        Превратить сырые данные в единую табличную структуру.
      logical_blocks:
        - Повторный fetch/поиск по каждому кандидату для проверки актуальности.
        - Нормализация: адрес -> район/улица; Wi-Fi/розетки -> да/нет/неизвестно; цена -> число или «—».
        - Формирование финального массива из 5 строк.
      entry_condition: Рабочая заметка из фазы 1 доступна.
      exit_condition: 5 строк с заполненными полями по схеме заголовков.
      collapse_risk: medium
      must_persist_before_exit:
        - Финальный массив строк зафиксирован в workspace-файле или черновике sheet-строк.
      context_notes: >
        Если источник не подтверждает Wi-Fi/розетки — ставить «неизвестно»,
        не додумывать.

    - id: 3
      name: Создание Google-таблицы
      goal: >
        Создать Google Spreadsheet «Ташкент — кофейни для работы»,
        один таб, заголовки в первой строке.
      logical_blocks:
        - Создать новый spreadsheet с заданным названием.
        - Установить один лист, переименовать при необходимости.
        - Записать заголовки: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Ссылка.
      entry_condition: Финальный массив строк из фазы 2 готов.
      exit_condition: Таблица создана, заголовки в строке 1.
      collapse_risk: low
      must_persist_before_exit:
        - ID/URL созданной таблицы сохранён в workspace-файл.
      context_notes: >
        Убедиться, что нет лишних листов — только один таб.

    - id: 4
      name: Заполнение строк
      goal: >
        Записать 5 проверенных строк данных в таблицу сразу под заголовками.
      logical_blocks:
        - Пакетная запись строк 2–6 по полям из фазы 2.
        - Проверка корректности записи (количество строк, заполненность ячеек).
      entry_condition: Таблица создана, заголовки на месте, массив строк готов.
      exit_condition: В таблице 6 строк (1 заголовок + 5 данных), все поля заполнены по схеме.
      collapse_risk: low
      must_persist_before_exit:
        - Подтверждение количества записанных строк сохранено в рабочую заметку.
      context_notes: >
        Не оставлять пустых ячеек кроме случаев «—» или «неизвестно».

    - id: 5
      name: Финальное сообщение пользователю
      goal: >
        Отправить пользователю ссылку на таблицу и короткую рекомендацию
        (2–3 предложения) о лучшей кофейне для длинной работы.
      logical_blocks:
        - Сформировать ссылку на созданную таблицу.
        - Выбрать лучшую кофейню по совокупности: Wi-Fi, розетки, часы, отзывы о работе.
        - Написать 2–3 предложения с обоснованием выбора.
        - Отправить сообщение с ссылкой и рекомендацией.
      entry_condition: Таблица заполнена, выбор обоснован данными.
      exit_condition: Пользователь получил ссылку и рекомендацию.
      collapse_risk: low
      must_persist_before_exit:
        - Финальное сообщение со ссылкой сохранено в workspace.
      context_notes: >
        Сообщение должно быть кратким, дружелюбным, без избыточных деталей.
      delivery_atmosphere:
        tone: дружелюбный, деловой, лаконичный
        user_facing: true
  non_goals:
    - Рейтинг или оценка звёздами каждой кофейни.
    - Карта с точками.
    - Более одного листа в таблице.
    - Обзвон или контакт с заведениями.
  assumptions:
    - Источники в открытом доступе (Google Maps, отзывы, сайты заведений).
    - Достаточно 5 строк; если найдено больше — выбираем 5 наиболее подтверждённых.
    - Цена эспрессо в сумах или «—» если недоступно.