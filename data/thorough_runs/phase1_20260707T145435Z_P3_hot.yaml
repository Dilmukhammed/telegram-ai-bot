```yaml
phase_plan:
  planner_id: hot_window
  summary: "Исследовать применимость сервисов Google для управления мероприятиями: выделить 5 ключевых функций, сопоставить сервисы, сравнить с 2-3 конкурентами. Результат – таблица в Google Таблицах или Документе."
  phase_count: 3
  phases:
    - id: 1
      name: "Сбор данных о возможностях сервисов Google и конкурентов"
      goal: "Получить актуальную информацию о функциональности сервисов Google (Gmail, Календарь, Документы, Формы, Карты, Таблицы, Задачи и др.) в контексте управления мероприятиями, а также о 2-3 конкурирующих платформах (например, Eventbrite, Cvent, Trello/Asana)."
      logical_blocks:
        - "Определить 5 ключевых функций для управления мероприятиями (регистрация, планирование расписания, уведомления/коммуникация, обратная связь/опросы, логистика/карты)."
        - "Выполнить веб-поиск по каждой функции: какие сервисы Google и конкуренты её покрывают (использовать поиск для сбора фактов)."
        - "Зафиксировать сырые данные в памяти (через use_tool, результат будет в истории)."
      entry_condition: "Получен запрос от пользователя с указанием сервисов и требованиями."
      exit_condition: "Собраны факты по каждой из 5 функций для сервисов Google и 2-3 конкурентов; данные находятся в hot window."
      collapse_risk: high
      must_persist_before_exit:
        - "Сырая сводка по каждой функции и сервису (краткий текст) – записать в Google Документ (новый или существующий)."
        - "Список конкурентов с источниками – сохранить в тот же документ."
      context_notes: "После сбора данных – немедленный persist в документ, иначе факты потеряются при переходе к анализу. Использовать не более 8-9 worker turns на этот этап."
    - id: 2
      name: "Анализ и построение таблицы соответствия сервисы ↔ функции"
      goal: "На основе собранных данных создать таблицу, где строки – сервисы Google (и отдельно конкуренты), столбцы – 5 функций, ячейки – оценка применимости (да/нет/частично) с комментариями."
      logical_blocks:
        - "Извлечь факты из сохранённого документа (чтение)."
        - "Сформировать матрицу: для каждого сервиса Google отметить степень поддержки каждой функции (0, 1, 2)."
        - "Добавить строки для конкурентов с аналогичной оценкой."
        - "Создать визуальную таблицу в Google Таблицах (или дополнить документ)."
      entry_condition: "Факты персистентно сохранены в документе, контекст очищен от сырых данных."
      exit_condition: "Таблица создана и записана в Google Таблицы; колонки: Сервис, Функция1..5, Итоговая оценка (подходит/нет)."
      collapse_risk: medium
      must_persist_before_exit:
        - "Итоговая таблица (весь лист) – Google Таблица. Ссылка фиксируется."
        - "Краткое резюме анализа (какие сервисы лучше всего подходят для мероприятий) – добавить в тот же документ."
      context_notes: "Анализ может потребовать 2-3 обращения к документу/таблице для обновления. Следить, чтобы не превысить 10 worker turns на этапе. При необходимости разбить на подэтапы с промежуточным persist."
    - id: 3
      name: "Финальная сводка и доставка пользователю"
      goal: "Оформить результат в виде читаемого отчёта (или сообщения) с основными выводами, ссылками на созданные таблицы и документы. Отправить пользователю через Telegram (если настроено) или сообщением в чате."
      logical_blocks:
        - "Прочитать финальную таблицу из Google Таблиц (проверить, что данные на месте)."
        - "Сформировать краткий текстовый отчёт: описание 5 функций, лучший сервис Google по каждой, сравнение с конкурентами, рекомендации."
        - "Отправить результат пользователю (доступные каналы: Telegram или прямое сообщение)."
      entry_condition: "Таблица и аналитика персистентно сохранены, контекст не содержит критичных данных."
      exit_condition: "Отчёт доставлен пользователю, все артефакты (документ, таблица) доступны по ссылкам."
      collapse_risk: low
      must_persist_before_exit:
        - "Финальный отчёт (текст) – сохранить в тот же Google Документ (или создать новый)."
        - "Ссылки на все созданные ресурсы – записать в документ."
      context_notes: "Заключительный этап, данные уже не пропадут. Можно использовать последние worker turns для форматирования. Если доставка через Telegram, убедиться, что канал доступен."
```