```yaml
phase_plan:
  planner_id: surface
  summary: >
    Создать Google-таблицу со сравнительной характеристикой 5 актуальных моделей
    (категория определяется из контекста запроса), собрать данные по ключевым
    параметрам, оформить в виде polished-артефакта и выдать пользователю
    итоговую рекомендацию с обоснованием.

  phase_count: 4

  delivery_atmosphere:
    tone: helpful_confident
    user_facing: true
    style: |
      Финальное сообщение — краткое, с уверенностью в выборе.
      Ссылка на таблицу + 2–3 предложения обоснования.
      Без воды, без перечисления всех параметров — только суть выбора.

  assumptions:
    - "Категория товаров определяется из контекста (смартфон / планшет / ноутбук / смарт-часы — по упоминанию Wi-Fi, Bluetooth, батареи, производительности)."
    - "5 моделей — актуальные на сегодня, популярные, доступные к покупке."
    - "Пользователь хочет готовую таблицу в Google Sheets и короткую рекомендацию."

  non_goals:
    - "Не делаем полный обзор каждой модели — только сравнительная таблица."
    - "Не создаём презентацию или PDF — только Sheet + сообщение."
    - "Не собираем отзывы пользователей — только спецификации."

  phases:
    - id: 1
      name: "Research & Model Selection"
      goal: >
        Определить категорию товара, выбрать 5 актуальных популярных моделей,
        найти для каждой: цену, производительность, время автономной работы,
        Wi-Fi (есть/нет/стандарт), Bluetooth (есть/нет/стандарт),
        дополнительные важные функции, прочие характеристики.
      logical_blocks:
        - block: "Определить категорию товара из контекста запроса; если неоднозначно — выбрать наиболее вероятную по набору характеристик (Wi-Fi + Bluetooth + батарея + производительность = смартфон/планшет/ноутбук)."
        - block: "Web-search: найти 5 актуальных и популярных моделей в категории на текущий момент."
        - block: "Для каждой модели найти спецификации по всем требуемым параметрам — один поиск на модель или групповой."
        - block: "Сразу записать найденные данные в промежуточный лист или doc — НЕ держать только в hot window."
      entry_condition: "Запрос получен, категория товара предположительно определена."
      exit_condition: >
        5 моделей выбраны; для каждой есть значения по всем ключевым
        параметрам; данные сохранены в durable-хранилище (sheet row / doc / fact store).
      collapse_risk: high
      must_persist_before_exit:
        - "Список из 5 моделей с полными спецификациями в Google Sheet (черновик) или рабочем doc."
        - "Источник цены для каждой модели (URL или название магазина)."
        - "Категория товара зафиксирована."
      context_notes: >
        Web-search результаты коллапсируют после ~10 ходов.
        Каждый search-result > 150 символов уходит в archive.
        ВСЕ спецификации должны быть перенесены в sheet/doc ДО выхода из фазы.
        Не рассчитывать на повторное чтение search-results.

    - id: 2
      name: "Data Verification & Structuring"
      goal: >
        Проверить корректность и полноту собранных данных,
        унифицировать форматы (цена в одной валюте, стандарты Wi-Fi/Bluetooth
        в едином формате), заполнить пробелы.
      logical_blocks:
        - block: "Прочитать черновик sheet/doc из фазы 1 — данные должны быть в durable-хранилище."
        - block: "Сверить ключевые параметры: цена, батарея, Wi-Fi стандарт, Bluetooth стандарт — по 1-2 дополнительным источникам при расхождениях."
        - block: "Унифицировать формат: цена → единая валюта; Wi-Fi → 'Wi-Fi 6' / 'Wi-Fi 5' / '—'; Bluetooth → '5.3' / '5.0' / '—'; батарея → 'ч' или 'мАч'."
        - block: "Записать обратно в sheet с унифицированными значениями."
      entry_condition: "Фаза 1 завершена: 5 моделей с спецификациями сохранены в durable-хранилище."
      exit_condition: >
        Все 5 моделей имеют заполненные значения по всем параметрам
        в едином формате; данные в Google Sheet (черновик).
      collapse_risk: medium
      must_persist_before_exit:
        - "Унифицированная таблица со всеми спецификациями в Google Sheet."
        - "Отметка о верификации каждого параметра (источник подтверждён)."
      context_notes: >
        Если данные из фазы 1 уже в sheet — можно читать оттуда.
        Дополнительные search-запросы минимальны — только для устранения расхождений.

    - id: 3
      name: "Polished Google Sheet Artifact"
      goal: >
        Создать финальную, отформатированную Google-таблицу:
        заголовки, цветовое выделение, сортировка, заморозка первой строки,
        ссылка для пользователя.
      logical_blocks:
        - block: "Создать новый Google Sheet или отформатировать черновик из фазы 2."
        - block: "Структура колонок: Модель | Цена | Производительность | Батарея | Wi-Fi | Bluetooth | Доп. функции | Прочее."
        - block: "Применить форматирование: жирные заголовки, заморозка строки 1, автоподбор ширины колонок, цветовое выделение лучшей модели в каждой категории (опционально)."
        - block: "Получить shareable-ссылку на таблицу."
      entry_condition: "Фаза 2 завершена: унифицированные данные в Google Sheet."
      exit_condition: >
        Google Sheet отформатирован, ссылка для просмотра получена,
        таблица содержит все 5 моделей со всеми параметрами.
      collapse_risk: low
      must_persist_before_exit:
        - "Shareable URL Google Sheet."
        - "Название таблицы и подтверждение форматирования."
      context_notes: >
        Все данные уже в sheet — фаза только про оформление.
        Зафиксировать URL в memory для использования в фазе 4.

    - id: 4
      name: "Recommendation & User Delivery"
      goal: >
        Проанализировать таблицу, выбрать оптимальную модель,
        доставить пользователю короткое сообщение со ссылкой и обоснованием.
      logical_blocks:
        - block: "Прочитать финальный sheet (или recall из memory) — оценить баланс цена/характеристики."
        - block: "Выбрать оптимальную модель: лучшее соотношение цены и возможностей, актуальность стандартов Wi-Fi/Bluetooth, батарея, доп. функции."
        - block: "Сформулировать обоснование в 2–3 предложения: почему именно эта модель из 5 предложенных."
        - block: "Отправить пользователю: ссылка на Google Sheet + рекомендация + краткое обоснование."
      entry_condition: "Фаза 3 завершена: Google Sheet отформатирован, URL получен."
      exit_condition: >
        Пользователь получил сообщение со ссылкой на таблицу
        и рекомендацией (2–3 предложения).
      collapse_risk: low
      must_persist_before_exit:
        - "URL Google Sheet в final delivery message."
        - "Название рекомендованной модели в message."
      context_notes: >
        Финальное сообщение — единственный артефакт, который видит пользователь.
        Должно содержать: ссылку, название выбранной модели, 2–3 предложения
        обоснования. Без перечисления всех характеристик — они в таблице.
```