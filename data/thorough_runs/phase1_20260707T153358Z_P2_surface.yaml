phase_plan:
  planner_id: surface
  summary: "Создать Google-таблицу с 5 проверенными кофейнями/коворкингами Ташкента для работы с ноутбуком. Финальная доставка — ссылка на таблицу + короткая рекомендация."
  phase_count: 3
  phases:
    - id: p1
      name: "Сбор данных по кофейням"
      goal: "Найти в интернете 5 кофеен или коворкингов в Ташкенте, куда реально приходят с ноутбуком, и собрать по каждой: название, район/адрес, часы работы, Wi-Fi, розетки, цена эспрессо, источник."
      logical_blocks:
        - "Поиск по запросам: 'кофейни Ташкент работа с ноутбуком', 'coworking café Tashkent laptop', 'лучшие кофейни Ташкент для работы', 'коворкинг Ташкент'"
        - "Для каждой найденной точки извлечь: название, адрес/район, часы работы, наличие Wi-Fi, наличие розеток, цену эспрессо (или знак '—'), URL-источник"
        - "Если данные по Wi-Fi/розеткам не указаны явно — ставить 'неизвестно', не догадываться"
        - "Записать все 5 строк в промежуточную структуру (текст в сообщении), чтобы данные не потерялись при коллапсе"
      entry_condition: "Получен запрос пользователя"
      exit_condition: "Собраны 5 записей с минимум: название, адрес, источник. Остальные поля могут быть 'неизвестно' или '—'."
      collapse_risk: high
      must_persist_before_exit:
        - "Список из 5 кофеен с полями: название, адрес, часы, wifi, розетки, цена эспрессо, источник — должен быть в тексте рабочего сообщения, не только в результатах поиска"
      context_notes: "Результаты веб-поиска коллапсируются быстро. Все 5 строк нужно сразу зафиксировать в виде структурированного текста в сообщении ассистента. Не рассчитывать на повторное чтение сырых данных."

    - id: p2
      name: "Создание Google-таблицы и заполнение"
      goal: "Создать Google-таблицу 'Ташкент — кофейни для работы' с одним табом, заголовками в первой строке и 5 строками данных."
      logical_blocks:
        - "Создать новую Google-таблицу с названием 'Ташкент — кофейни для работы'"
        - "В первой строке задать заголовки: Название, Район/Адрес, Часы работы, Wi-Fi, Розетки, Цена эспрессо, Источник"
        - "Заполнить строки 2–6 данными из p1 (5 кофеен)"
        - "Проверить, что все 5 строк записаны и заголовки на месте"
      entry_condition: "5 строк с данными зафиксированы в тексте (p1 завершён)"
      exit_condition: "Google-таблица создана, заполнена, URL сохранён"
      collapse_risk: medium
      must_persist_before_exit:
        - "URL созданной Google-таблицы"
        - "Подтверждение: 5 строк + заголовки записаны"
      context_notes: "Брать данные из текста рабочего сообщения p1, а не из архивных результатов поиска. Если в p1 данные не были зафиксированы — вернуться к поиску."

    - id: p3
      name: "Финальное сообщение пользователю"
      goal: "Отправить пользователю ссылку на таблицу и короткую рекомендацию (2–3 предложения): какая из пяти лучше для длинной работы и почему."
      logical_blocks:
        - "Указать ссылку на Google-таблицу"
        - "Выбрать лучшую кофейню для длительной работы (критерии: розетки, Wi-Fi, удобство, часы работы)"
        - "Написать 2–3 предложения с обоснованием выбора"
      entry_condition: "Google-таблица создана, URL сохранён (p2 завершён)"
      exit_condition: "Пользователь получил ссылку и рекомендацию"
      collapse_risk: low
      must_persist_before_exit:
        - "Ссылка на таблицу в финальном сообщении"
        - "Текст рекомендации"
      context_notes: "Рекомендация опирается на данные из таблицы, не на сырые результаты поиска."

  delivery_atmosphere:
    tone: "дружелюбный, по делу, без воды"
    user_facing: "Сообщение на русском: ссылка на таблицу + короткая рекомендация. Без технических деталей."

  non_goals:
    - "Не нужно собирать больше 5 точек"
    - "Не нужно украшать таблицу (цвета, форматирование) — только данные"
    - "Не нужно искать отзывы или рейтинги — только факты: часы, Wi-Fi, розетки, цена"

  assumptions:
    - "Wi-Fi и розетки могут быть не указаны в источниках — в этом случае ставим 'неизвестно'"
    - "Цена эспрессо может быть не указана — ставим '—'"
    - "Часы работы могут быть сезонными или устаревшими — указываем как есть из источника"